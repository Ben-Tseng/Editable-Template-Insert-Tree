<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <style type="text/css">
      /* Black & white minimal popup */
      :root {
        --bg: #ffffff;
        --fg: #111111;
        --muted: #666666;
        --border: #e5e5e5;
        --border-strong: #bdbdbd;
        --hover: #f7f7f7;
      }
      body {
        width: 420px;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial;
        margin: 0; padding: 0; background: var(--bg); color: var(--fg);
      }
      h2 { margin: 12px 16px; font-size:15px; font-weight:700; letter-spacing: 0.2px; }
      .toolbar { padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--bg); }
      .btn-add {
        background: #111;
        color: #fff; padding:6px 12px; border-radius:6px; border:1px solid #111; cursor:pointer; font-weight:600;
      }
      .template-list { padding: 12px 16px; max-height: 420px; overflow-y: auto; }
      .template-item {
        margin-bottom: 10px; padding:10px; border-radius:6px; background:#fff; border:1px solid var(--border);
      }
      .template-item:hover { background: var(--hover); border-color: var(--border-strong); }
      .template-item-title { font-weight:600; color:#111; margin-bottom:6px; }
      .template-preview { font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
      .template-btn { background:transparent; color:#111; border:1px solid var(--border); padding:5px 8px; border-radius:6px; cursor:pointer; margin-right:6px; }
      .template-btn-delete { color:#111; }
      .btn-group { margin-top:8px; }
      .empty-state { text-align:center; padding:36px 16px; color:var(--muted); }
    </style>
  </head>
  <body>
    <h2>Template Manager</h2>
    <div class="toolbar">
      <button class="btn-add" id="btnAdd">Add Template</button>
    </div>
    <div class="template-list" id="templateList">
      <div class="empty-state">No templates yet. Click "Add Template" to get started!</div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
