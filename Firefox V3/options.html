<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Template Tree Options</title>
    <style>
      /* Black & white minimal UI */
      :root {
        --bg: #ffffff;
        --fg: #111111;
        --muted: #666666;
        --border: #e5e5e5;
        --border-strong: #bdbdbd;
        --card: #ffffff;
        --hover: #f7f7f7;
        --focus: #111111;
      }
      * { box-sizing: border-box; }
      html,body { height: 100%; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial;
        background: var(--bg);
        color: var(--fg);
        padding: 28px;
        max-width: 920px;
        margin: 0 auto;
        line-height: 1.4;
      }

      h1 {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 16px;
        letter-spacing: 0.2px;
      }

      .toolbar { margin-bottom: 18px; }

      .settings-section {
        background: var(--card);
        padding: 12px;
        margin-bottom: 14px;
        border-radius: 8px;
        border: 1px solid var(--border);
      }

      .templates-container { display: grid; gap: 14px; }

      .template-card {
        background: var(--card);
        border-radius: 8px;
        padding: 14px;
        border: 1px solid var(--border);
        transition: background 120ms ease, border-color 120ms ease;
      }

      .template-card:hover { background: var(--hover); border-color: var(--border-strong); }

      .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
      .card-title { font-size:15px; font-weight:600; color:#111; }

      .btn-delete {
        background: transparent;
        color: #111;
        border: 1px solid var(--border);
        padding: 6px 10px;
        border-radius: 6px;
        cursor: pointer;
        font-size:12px;
      }

      .form-group { margin-bottom:12px; }
      .form-group label { display:block; font-size:12px; color:var(--muted); margin-bottom:6px; }

      .form-group input[type="text"], .form-group textarea {
        width:100%; padding:10px 12px; border-radius:6px; border:1px solid var(--border);
        background: #fff; font-size:13px; color:#111; resize:vertical;
      }
      .form-group input[type="text"]:focus, .form-group textarea:focus {
        outline: none; border-color: var(--focus);
      }

      .options-container { margin-top:8px; }
      .option-item { margin-bottom:10px; }
      .option-item label { font-size:12px; color:var(--muted); margin-bottom:6px; display:block; }

      .card-actions { display:flex; gap:10px; margin-top:12px; }

      .btn-save {
        background: #111;
        color: #fff; padding:8px 14px; border-radius:6px; border:1px solid #111; cursor:pointer; font-weight:600;
      }

      .btn-save:active { transform: translateY(1px); }

      .empty-state { text-align:center; padding:40px 12px; color:var(--muted); }

      .success-message { color:#111; font-size:12px; margin-top:8px; display:none; }
      .success-message.show { display:block; }

      .btn-primary {
        background: #111;
        color: #fff;
        border: 1px solid #111;
        padding: 8px 12px;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
      }

      .settings-item { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); }
    </style>
  </head>
  <body>
    <h1>Template Manager</h1>

    <div class="settings-section">
      <div class="settings-item">
        <input type="checkbox" id="useLightIcon" name="useLightIcon">
        <label for="useLightIcon">Use light-colored extension icon</label>
      </div>
    </div>

    <div class="toolbar">
      <button class="btn-primary" id="btnAddTemplate">Add Template</button>
    </div>

    <div class="templates-container" id="templatesContainer">
      <div class="empty-state">No templates yet. Click "Add Template" to get started!</div>
    </div>

    <script src="options.js"></script>
  </body>
</html>
